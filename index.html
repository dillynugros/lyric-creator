<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Studio "Double K"</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        [contenteditable]:empty:before { content: attr(placeholder); color: #64748b; pointer-events: none; display: block; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 p-4 md:p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        
        <header class="mb-8 border-b border-slate-800 pb-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent flex items-center gap-3">
                    <i data-lucide="mic-2" class="w-8 h-8 text-indigo-400"></i>
                    Lyric Studio "Double K"
                </h1>
                <p class="text-slate-400 mt-2 text-sm md:text-base">
                    Asisten Komposer Cerdas Anda. Buat lagu hits berikutnya! bersama Studio Double K (Khansa & Khalid)
                </p>
            </div>
            <button onclick="updateKey()" class="px-4 py-2 bg-slate-900 border border-slate-700 rounded-xl text-xs hover:bg-slate-800 transition-all flex items-center gap-2">
                <i data-lucide="key" class="w-4 h-4"></i> Pengaturan API Key
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                    <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-white">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-purple-400"></i> Briefing Lagu
                    </h2>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-400 mb-2">Ide Cerita / Topik</label>
                        <textarea id="theme" placeholder="Contoh: Perjuangan merantau di kota besar demi keluarga..."
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all min-h-[100px] resize-none"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-400 mb-2">Genre Musik</label>
                        <select id="genre" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 appearance-none">
                            <option value="Pop">Pop</option>
                            <option value="Rock">Rock</option>
                            <option value="R&B / Soul">R&B / Soul</option>
                            <option value="Hip Hop / Rap">Hip Hop / Rap</option>
                            <option value="Dangdut">Dangdut</option>
                            <option value="Folk / Indie">Folk / Indie</option>
                            <option value="Jazz">Jazz</option>
                            <option value="Lagu Anak">Lagu Anak</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-400 mb-2">Mood / Suasana</label>
                        <select id="mood" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500">
                            <option value="Emosional / Galau">Emosional / Galau</option>
                            <option value="Semangat / Energik">Semangat / Energik</option>
                            <option value="Romantis / Kasmaran">Romantis / Kasmaran</option>
                            <option value="Santai / Chill">Santai / Chill</option>
                            <option value="Ceria / Bahagia">Ceria / Bahagia</option>
                        </select>
                    </div>

                    <button id="generate-btn" class="w-full py-3 px-4 rounded-xl font-medium flex items-center justify-center transition-all bg-indigo-600 hover:bg-indigo-500 text-white">
                        <span id="gen-idle" class="flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i> Generate Lirik</span>
                        <span id="gen-loading" class="flex items-center gap-2 hidden"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Menyusun Lirik...</span>
                    </button>

                    <div id="error-box" class="mt-4 p-3 bg-red-900/30 border border-red-800/50 rounded-lg text-red-400 text-sm hidden"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-xl h-full flex flex-col min-h-[600px]">
                    <div class="bg-slate-800/50 p-4 border-b border-slate-800 flex items-center justify-between">
                        <h3 class="font-medium text-slate-200 flex items-center gap-2">
                            <i data-lucide="file-text" class="w-5 h-5 text-slate-400"></i> Kertas Kerja
                        </h3>
                        <div class="flex gap-2">
                            <button id="copy-btn" disabled class="p-2 rounded-lg text-slate-600 cursor-not-allowed border border-transparent">
                                <span id="copy-idle"><i data-lucide="copy" class="w-4 h-4"></i></span>
                                <span id="copy-success" class="hidden text-emerald-400"><i data-lucide="check" class="w-4 h-4"></i></span>
                            </button>
                        </div>
                    </div>

                    <div class="flex-grow relative overflow-auto">
                        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 text-center p-8">
                            <i data-lucide="music" class="w-16 h-16 mb-4 opacity-20"></i>
                            <p>Isi briefing dan tekan Generate untuk memulai.</p>
                        </div>
                        <div id="editor" contenteditable="true" spellcheck="false" 
                            class="w-full min-h-full p-8 focus:outline-none font-mono text-sm leading-relaxed whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let API_KEY = localStorage.getItem('gemini_key') || "";

        function updateKey() {
            const newKey = prompt("Masukkan Google Gemini API Key Anda:", API_KEY);
            if (newKey) {
                API_KEY = newKey.trim();
                localStorage.setItem('gemini_key', API_KEY);
                alert("API Key tersimpan!");
            }
        }

        const editor = document.getElementById('editor');
        const errorBox = document.getElementById('error-box');
        const generateBtn = document.getElementById('generate-btn');

        async function handleGenerate() {
            if (!API_KEY) {
                updateKey();
                if (!API_KEY) return;
            }

            const theme = document.getElementById('theme').value;
            if (!theme) {
                errorBox.innerText = "Isi tema lagu terlebih dahulu!";
                errorBox.classList.remove('hidden');
                return;
            }

            errorBox.classList.add('hidden');
            document.getElementById('gen-idle').classList.add('hidden');
            document.getElementById('gen-loading').classList.remove('hidden');
            generateBtn.disabled = true;
            document.getElementById('empty-state').classList.add('hidden');

            try {
                // KODE INI YANG MEMPERBAIKI MASALAH MODEL NOT FOUND
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tulis lirik lagu lengkap ([Intro], [Verse], [Chorus], [Bridge], [Outro]) dengan Tema: ${theme}, Genre: ${document.getElementById('genre').value}, Mood: ${document.getElementById('mood').value}. Gunakan Bahasa Indonesia yang puitis.` }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const lyrics = data.candidates[0].content.parts[0].text;
                editor.innerText = lyrics;
                document.getElementById('copy-btn').disabled = false;
                document.getElementById('copy-btn').classList.remove('cursor-not-allowed', 'text-slate-600');
                document.getElementById('copy-btn').classList.add('text-slate-300', 'hover:bg-slate-800');

            } catch (err) {
                errorBox.innerText = "Error: " + err.message;
                errorBox.classList.remove('hidden');
                console.error(err);
            } finally {
                document.getElementById('gen-idle').classList.remove('hidden');
                document.getElementById('gen-loading').classList.add('hidden');
                generateBtn.disabled = false;
            }
        }

        generateBtn.addEventListener('click', handleGenerate);

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(editor.innerText);
            document.getElementById('copy-idle').classList.add('hidden');
            document.getElementById('copy-success').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('copy-idle').classList.remove('hidden');
                document.getElementById('copy-success').classList.add('hidden');
            }, 2000);
        });
    </script>
</body>
</html>
